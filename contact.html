<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Jan Ivan Portfolio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap"
      rel="stylesheet"
    />
    <style>
      .form-group {
        margin-bottom: 24px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-color);
        font-size: 14px;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-secondary);
        color: var(--text-color);
        font-family: var(--font-main);
        font-size: 17px;
        transition: border-color 0.2s ease;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-color);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 150px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div
        class="container-xl"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
        "
      >
        <a href="index.html" class="logo">Jan Ivan</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <section class="section">
        <div class="container" style="text-align: center;">
          <h2 style="font-size: 56px; margin-bottom: 20px;">Get In Touch.</h2>
          <p class="subtitle" style="color: var(--text-secondary); max-width: 600px; margin: 0 auto 60px;">
            Have an exciting project in mind? I'd love to hear from you.
          </p>
          
          <div class="card" style="max-width: 600px; margin: 0 auto; text-align: left; height: auto; padding: 40px;">
            <form action="#">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can I help you?" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">Send Message</button>
            </form>
          </div>
        </div>
      </section>

      <section class="section bg-secondary">
        <div class="container">
          <div class="grid">
            <div class="card" style="height: auto; text-align: center;">
              <h3 class="card-title">Email</h3>
              <p style="margin-top: 10px;"><a href="mailto:janivantot@gmail.com" style="color: var(--accent-color); text-decoration: none;">janivantot@gmail.com</a></p>
            </div>
            <div class="card" style="height: auto; text-align: center;">
              <h3 class="card-title">GitHub</h3>
              <p style="margin-top: 10px;"><a href="https://github.com/johnivn" style="color: var(--accent-color); text-decoration: none;">github.com/johnivn</a></p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
        <p style="text-align: center; font-size: 19px; color: var(--text-secondary);">&copy; 2026 Jan Ivan Montenegro. All rights reserved.</p>
        <div class="social-links" style="display: flex; gap: 30px; justify-content: center; margin-top: 40px;">
          <a href="https://github.com/johnivn"><i class="bi bi-github" style="font-size: 1.5rem;"></i></a>
          <a href="mailto:janivantot@gmail.com"><i class="bi bi-envelope-fill" style="font-size: 1.5rem;"></i></a>
          <a href="https://linkedin.com"><i class="bi bi-linkedin" style="font-size: 1.5rem;"></i></a>
        </div>
      </div>
    </footer>
  </body>
</html>
